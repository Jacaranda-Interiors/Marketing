<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post 3 - Jacaranda Interiors</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!--
    Post 3: product spotlight layout.
    To update the spotlighted product story, edit the title, subtitle, and supporting copy.
  -->
  <main class="post">
    <section class="canvas spotlight-layout">
      <article>
        <p class="brand-mark">Jacaranda Interiors</p>
        <h1 class="display" style="margin-top: 28px; max-width: 420px;">Quietly transformative</h1>
        <p class="subheadline" style="margin-top: 24px; max-width: 460px;">Timeless pieces change everything around them</p>
        <div class="divider" style="margin-top: 34px;"></div>
        <p class="body-copy" style="margin-top: 34px; max-width: 460px;">
          Consider proportion, finish, and the softness of the silhouette. The right object does not dominate a room — it clarifies it.
        </p>

        <div class="material-row">
          <div class="material-swatch stone"></div>
          <div class="material-swatch linen"></div>
          <div class="material-swatch sage"></div>
        </div>
      </article>

      <div class="product-card panel">
        <div class="image-block product" style="min-height: 740px; border-radius: 26px;">
          <span class="image-label">Product spotlight placeholder</span>
        </div>
        <div class="footer-line" style="margin-top: 24px;">
          <p class="small-label">Luxury styling</p>
          <p class="small-label">Object • atmosphere • balance</p>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
