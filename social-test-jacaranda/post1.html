<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post 1 - Jacaranda Interiors</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!--
    Post 1: editorial quote post.
    Update the main quote text inside the H1 below if you want a different message.
  -->
  <main class="post">
    <section class="canvas quote-layout">
      <header>
        <p class="brand-mark">Jacaranda Interiors</p>
      </header>

      <article class="quote-card">
        <div class="quote-mark">“</div>
        <h1 class="headline-xl quote-text">A home should feel collected, not decorated</h1>
        <div class="signature-row">
          <div class="divider"></div>
          <p class="caption">Jacaranda Interiors</p>
        </div>
      </article>

      <footer class="footer-line">
        <p class="footer-note">Editorial quote post</p>
        <p class="footer-note">Refined interiors • timeless layering</p>
      </footer>
    </section>
  </main>
</body>
</html>
